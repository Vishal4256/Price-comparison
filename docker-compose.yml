version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: pricewise_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      # Set other vars via .env
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: pricewise_frontend
    ports:
      - "80:80"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pricewise_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
